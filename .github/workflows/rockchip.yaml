name: Build Rockchip

on:
  schedule:
    - cron: '0 16 * * 0'  # UTC 16:00 Sunday = Beijing 00:00 Monday
  workflow_dispatch:

env:
  TZ: Asia/Shanghai

jobs:
  build:
    name: Build Rockchip
    runs-on: ubuntu-24.04
    steps:
      - name: Free disk space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: true
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          swap-storage: false

      - name: Checkout
        uses: actions/checkout@v4

      - name: Restore dl cache
        uses: actions/cache@v4
        with:
          path: shared/dl
          key: dl-rockchip-${{ hashFiles('configs/rockchip.config', 'configs/feeds.conf') }}
          restore-keys: dl-rockchip-

      - name: Restore ccache
        uses: actions/cache@v4
        with:
          path: shared/ccache
          key: ccache-rockchip-${{ github.run_id }}
          restore-keys: ccache-rockchip-

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            ack antlr3 asciidoc autoconf automake autopoint binutils bison build-essential \
            bzip2 ccache clang cmake cpio curl device-tree-compiler flex gawk gcc-multilib g++-multilib gettext \
            genisoimage git gperf haveged help2man intltool libc6-dev-i386 libelf-dev libfuse-dev libglib2.0-dev \
            libgmp3-dev libltdl-dev libmpc-dev libmpfr-dev libncurses5-dev libncursesw5-dev libpython3-dev \
            libreadline-dev libssl-dev libtool llvm lrzsz libnsl-dev ninja-build p7zip p7zip-full patch pkgconf \
            python3 python3-pyelftools python3-setuptools qemu-utils rsync scons squashfs-tools subversion \
            swig texinfo uglifyjs upx-ucl unzip vim wget xmlto xxd zlib1g-dev

      - name: Clone lede source
        run: git clone --depth=1 https://github.com/coolsnowwolf/lede lede-src

      - name: Init shared directories
        run: mkdir -p shared/dl shared/feeds shared/ccache

      - name: Build
        run: bash scripts/build-rockchip.sh

      - name: Upload firmware
        uses: actions/upload-artifact@v4
        with:
          name: firmware-rockchip
          path: output/rockchip/firmware/
          retention-days: 1

  release:
    name: Release
    runs-on: ubuntu-24.04
    needs: build
    permissions:
      contents: write
    steps:
      - name: Set release tag
        id: tag
        run: echo "tag=rockchip-$(TZ=Asia/Shanghai date +%Y%m%d)" >> "$GITHUB_OUTPUT"

      - name: Download firmware
        uses: actions/download-artifact@v4
        with:
          name: firmware-rockchip
          path: release/

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: ${{ steps.tag.outputs.tag }}
          body: |
            Rockchip weekly build — ${{ steps.tag.outputs.tag }}

            | Target | Status |
            |--------|--------|
            | Rockchip H28K | ✅ |
          files: release/*
          prerelease: true

      - name: Cleanup old releases (keep 4)
        uses: dev-drprasad/delete-older-releases@v0.3.4
        with:
          keep_latest: 4
          delete_tags: true
          delete_tag_pattern: rockchip-
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}