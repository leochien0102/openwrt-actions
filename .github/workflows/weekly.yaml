name: Weekly Build

on:
  schedule:
    - cron: '0 16 * * 0'  # UTC 16:00 Sunday = Beijing 00:00 Monday
  workflow_dispatch:       # allow manual trigger

env:
  TZ: Asia/Shanghai

jobs:

  ##############################################################
  # rockchip
  ##############################################################
  build-rockchip:
    name: Build Rockchip
    runs-on: ubuntu-24.04
    steps:
      - name: Free disk space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: true
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          swap-storage: false

      - name: Checkout
        uses: actions/checkout@v4

      - name: Restore dl cache
        uses: actions/cache@v4
        with:
          path: shared/dl
          key: dl-rockchip-${{ hashFiles('configs/rockchip.config', 'configs/feeds.conf') }}
          restore-keys: dl-rockchip-

      - name: Restore ccache
        uses: actions/cache@v4
        with:
          path: shared/ccache
          key: ccache-rockchip-${{ github.run_id }}
          restore-keys: ccache-rockchip-

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential clang flex bison g++ gawk gcc-multilib \
            gettext git libncurses-dev libssl-dev python3-distutils \
            rsync unzip zlib1g-dev file wget ccache

      - name: Build
        run: bash scripts/build-rockchip.sh

      - name: Upload firmware
        uses: actions/upload-artifact@v4
        with:
          name: firmware-rockchip
          path: output/rockchip/firmware/
          retention-days: 1

  ##############################################################
  # armvirt
  ##############################################################
  build-armvirt:
    name: Build Armvirt
    runs-on: ubuntu-24.04
    steps:
      - name: Free disk space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: true
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          swap-storage: false

      - name: Checkout
        uses: actions/checkout@v4

      - name: Restore dl cache
        uses: actions/cache@v4
        with:
          path: shared/dl
          key: dl-armvirt-${{ hashFiles('configs/armvirt.config', 'configs/feeds.conf') }}
          restore-keys: dl-armvirt-

      - name: Restore ccache
        uses: actions/cache@v4
        with:
          path: shared/ccache
          key: ccache-armvirt-${{ github.run_id }}
          restore-keys: ccache-armvirt-

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential clang flex bison g++ gawk gcc-multilib \
            gettext git libncurses-dev libssl-dev python3-distutils \
            rsync unzip zlib1g-dev file wget ccache

      - name: Build
        run: bash scripts/build-armvirt.sh

      - name: Upload rootfs
        uses: actions/upload-artifact@v4
        with:
          name: rootfs-armvirt
          path: build/armvirt/bin/targets/**/*rootfs.tar.gz
          retention-days: 1

  ##############################################################
  # n1 (depends on armvirt rootfs)
  ##############################################################
  build-n1:
    name: Build N1
    runs-on: ubuntu-24.04
    needs: build-armvirt
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y xz-utils

      - name: Download rootfs
        uses: actions/download-artifact@v4
        with:
          name: rootfs-armvirt
          path: build/armvirt/bin/targets

      - name: Restore kernels cache
        uses: actions/cache@v4
        with:
          path: packit/kernels
          key: packit-kernels

      - name: Build N1
        run: bash scripts/build-n1.sh

      - name: Upload firmware
        uses: actions/upload-artifact@v4
        with:
          name: firmware-n1
          path: output/armvirt/firmware/
          retention-days: 1

  ##############################################################
  # release
  ##############################################################
  release:
    name: Release
    runs-on: ubuntu-24.04
    needs: [build-rockchip, build-n1]
    permissions:
      contents: write
    steps:
      - name: Set release tag
        id: tag
        run: echo "tag=weekly-$(TZ=Asia/Shanghai date +%Y%m%d)" >> "$GITHUB_OUTPUT"

      - name: Download rockchip firmware
        uses: actions/download-artifact@v4
        with:
          name: firmware-rockchip
          path: release/rockchip

      - name: Download n1 firmware
        uses: actions/download-artifact@v4
        with:
          name: firmware-n1
          path: release/n1

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: ${{ steps.tag.outputs.tag }}
          body: |
            Weekly build — ${{ steps.tag.outputs.tag }}

            | Target | Status |
            |--------|--------|
            | Rockchip (H28K) | ✅ |
            | Amlogic N1 | ✅ |
          files: |
            release/rockchip/*
            release/n1/*
          prerelease: true

      - name: Cleanup old releases (keep 7)
        uses: dev-drprasad/delete-older-releases@v0.3.4
        with:
          keep_latest: 4
          delete_tags: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}