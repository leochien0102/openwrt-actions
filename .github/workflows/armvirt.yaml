name: Build Armvirt

on:
  workflow_dispatch:

env:
  TZ: Asia/Shanghai

jobs:
  ##############################################################
  # armvirt
  ##############################################################
  build-armvirt:
    name: Build Armvirt
    runs-on: ubuntu-24.04
    steps:
      - name: Free disk space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: true
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          swap-storage: false

      - name: Checkout
        uses: actions/checkout@v4

      - name: Restore dl cache
        uses: actions/cache@v4
        with:
          path: shared/dl
          key: dl-armvirt-${{ hashFiles('configs/armvirt.config', 'configs/feeds.conf') }}
          restore-keys: dl-armvirt-

      - name: Restore ccache
        uses: actions/cache@v4
        with:
          path: shared/ccache
          key: ccache-armvirt-${{ github.run_id }}
          restore-keys: ccache-armvirt-

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            ack antlr3 asciidoc autoconf automake autopoint binutils bison build-essential \
            bzip2 ccache clang cmake cpio curl device-tree-compiler flex gawk gcc-multilib g++-multilib gettext \
            genisoimage git gperf haveged help2man intltool libc6-dev-i386 libelf-dev libfuse-dev libglib2.0-dev \
            libgmp3-dev libltdl-dev libmpc-dev libmpfr-dev libncurses5-dev libncursesw5-dev libpython3-dev \
            libreadline-dev libssl-dev libtool llvm lrzsz libnsl-dev ninja-build p7zip p7zip-full patch pkgconf \
            python3 python3-pyelftools python3-setuptools qemu-utils rsync scons squashfs-tools subversion \
            swig texinfo uglifyjs upx-ucl unzip vim wget xmlto xxd zlib1g-dev

      - name: Clone lede source
        run: git clone --depth=1 https://github.com/coolsnowwolf/lede lede-src

      - name: Init shared directories
        run: mkdir -p shared/dl shared/feeds shared/ccache

      - name: Build
        run: bash scripts/build-armvirt.sh

      - name: Upload rootfs
        uses: actions/upload-artifact@v4
        with:
          name: rootfs-armvirt
          path: build/armvirt/bin/targets/**/*rootfs.tar.gz
          retention-days: 7

  ##############################################################
  # n1
  ##############################################################
  build-n1:
    name: Build N1
    runs-on: ubuntu-24.04
    needs: build-armvirt
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y xz-utils btrfs-progs dosfstools parted

      - name: Download rootfs
        uses: actions/download-artifact@v4
        with:
          name: rootfs-armvirt
          path: build/armvirt/bin/targets

      - name: Clone openwrt_packit
        run: git clone --depth=1 https://github.com/unifreq/openwrt_packit packit

      - name: Checkout kernels branch
        uses: actions/checkout@v4
        with:
          ref: kernels
          path: packit/kernels
          sparse-checkout: .
          sparse-checkout-cone-mode: false

      - name: Build N1
        run: bash scripts/build-n1.sh

      - name: Upload firmware
        uses: actions/upload-artifact@v4
        with:
          name: firmware-n1
          path: output/armvirt/firmware/
          retention-days: 1

  ##############################################################
  # release
  ##############################################################
  release:
    name: Release
    runs-on: ubuntu-24.04
    needs: build-n1
    permissions:
      contents: write
    steps:
      - name: Set release tag
        id: tag
        run: echo "tag=armvirt-$(TZ=Asia/Shanghai date +%Y%m%d)" >> "$GITHUB_OUTPUT"

      - name: Download n1 firmware
        uses: actions/download-artifact@v4
        with:
          name: firmware-n1
          path: release/

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: ${{ steps.tag.outputs.tag }}
          body: |
            Armvirt weekly build — ${{ steps.tag.outputs.tag }}

            | Target | Status |
            |--------|--------|
            | Amlogic N1 | ✅ |
          files: release/*
          prerelease: true

      - name: Cleanup old releases (keep 4)
        uses: dev-drprasad/delete-older-releases@v0.3.4
        with:
          keep_latest: 4
          delete_tags: true
          delete_tag_pattern: armvirt-
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}